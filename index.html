<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restaurant Бишкек</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#111;
      color:white;
    }

    header{
      height:100vh;
      background:
      linear-gradient(rgba(0,0,0,0.6),
      rgba(0,0,0,0.6)),
      url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1600&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    .hero h1{
      font-size:70px;
      color:#ffcc00;
      margin-bottom:20px;
      text-shadow:0 0 20px black;
    }

    .hero p{
      font-size:24px;
      margin-bottom:30px;
    }

    .btn{
      padding:15px 35px;
      background:#ffcc00;
      color:black;
      text-decoration:none;
      border-radius:40px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      background:white;
      transform:scale(1.05);
    }

    section{
      padding:80px 10%;
    }

    .title{
      text-align:center;
      font-size:42px;
      margin-bottom:50px;
      color:#ffcc00;
    }

    .menu{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:30px;
    }

    .card{
      background:#1e1e1e;
      border-radius:20px;
      overflow:hidden;
      transition:0.3s;
      box-shadow:0 0 15px rgba(255,255,255,0.1);
    }

    .card:hover{
      transform:translateY(-10px);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
    }

    .card-content h3{
      margin-bottom:10px;
      color:#ffcc00;
    }

    .price{
      margin-top:15px;
      font-size:20px;
      color:#00ff99;
    }

    footer{
      text-align:center;
      padding:30px;
      background:black;
      color:#aaa;
    }
  </style>
</head>
<body>

<header>
  <div class="hero">
    <h1>🍴 Restaurant Бишкек</h1>
    <p>Самая вкусная еда в городе</p>
    <a href="#menu" class="btn">Смотреть меню</a>
  </div>
</header>

<section id="menu">
  <h2 class="title">Наше меню</h2>

  <div class="menu">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=1200&auto=format&fit=crop">
      <div class="card-content">
        <h3>Пицца</h3>
        <p>Итальянская пицца с сыром и томатами.</p>
        <div class="price">450 сом</div>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?q=80&w=1200&auto=format&fit=crop">
      <div class="card-content">
        <h3>Бургер</h3>
        <p>Сочный бургер с говядиной и овощами.</p>
        <div class="price">390 сом</div>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=1200&auto=format&fit=crop">
      <div class="card-content">
        <h3>Салат</h3>
        <p>Свежий овощной салат с соусом.</p>
        <div class="price">250 сом</div>
      </div>
    </div>

  </div>
</section>

<footer>
  © 2026 Restaurant Бишкек | Бишкек, Кыргызстан 🇰🇬
</footer>

</body>
</html>
